server:
  port: 8082

spring:

  application:
    name: notification-service

  Kafka:
    bootstrap-servers: kafka:9092

  mail:
    host: smtp.gmail.com
    port: 587
    username: yourmail@gmail.com
    password: app-password

    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
